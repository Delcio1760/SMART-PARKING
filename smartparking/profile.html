<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meu Perfil — Smart Parking</title>
  <link rel="stylesheet" href="assets/css/main.css">
  <style>
    .profile-layout { display: grid; grid-template-columns: 300px 1fr; gap: var(--space-2xl); }
    @media(max-width:900px) { .profile-layout { grid-template-columns: 1fr; } }

    .avatar {
      width: 80px; height: 80px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--color-accent), var(--color-accent-dark));
      display: flex; align-items: center; justify-content: center;
      font-family: var(--font-display);
      font-size: 2rem; font-weight: 800; color: #111;
      margin-bottom: var(--space-md);
    }

    .profile-sidebar {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-xl);
      padding: var(--space-xl);
      height: fit-content;
    }

    .sidebar-nav { margin-top: var(--space-xl); display: flex; flex-direction: column; gap: 4px; }
    .sidebar-link {
      padding: var(--space-sm) var(--space-md);
      border-radius: var(--radius-sm);
      font-size: 0.875rem;
      color: var(--color-text-muted);
      cursor: pointer;
      transition: all var(--transition);
      display: flex; align-items: center; gap: var(--space-sm);
    }
    .sidebar-link:hover, .sidebar-link.active {
      background: var(--color-surface-2);
      color: var(--color-text);
    }
    .sidebar-link.active { color: var(--color-accent); }
  </style>
</head>
<body data-page="profile">

  <div id="navbar-placeholder"></div>

  <main class="page-wrapper">
    <div class="container section">

      <div class="section-label">Conta</div>
      <h1 class="section-title" style="margin-bottom:var(--space-2xl)">Meu Perfil</h1>

      <div class="profile-layout">
        <!-- Sidebar -->
        <aside class="profile-sidebar">
          <div class="avatar" id="avatar-initials">?</div>
          <div style="font-weight:700;font-family:var(--font-display)" id="sidebar-name">—</div>
          <div style="font-size:0.85rem;color:var(--color-text-muted)" id="sidebar-email">—</div>
          <div class="sidebar-nav">
            <div class="sidebar-link active">👤 Dados Pessoais</div>
            <a href="reservations.html" class="sidebar-link">📅 Reservas</a>
            <div class="sidebar-link" id="sidebar-vehicles-btn">🚗 Veículos</div>
            <div class="sidebar-link" style="color:var(--color-danger)" id="btn-logout">🚪 Terminar Sessão</div>
          </div>
        </aside>

        <!-- Main content -->
        <div class="flex-col" style="gap:var(--space-xl)">
          <!-- Personal data -->
          <div class="card" style="padding:var(--space-xl)">
            <h2 style="font-size:1.1rem;font-family:var(--font-display);margin-bottom:var(--space-xl)">Dados Pessoais</h2>
            <form id="profile-form">
              <div class="flex-col" style="gap:var(--space-md)">
                <div class="grid-2" style="display:grid;grid-template-columns:1fr 1fr;gap:var(--space-md)">
                  <div class="form-group">
                    <label class="form-label">Nome completo</label>
                    <input class="form-input" id="profile-name" type="text">
                  </div>
                  <div class="form-group">
                    <label class="form-label">Email</label>
                    <input class="form-input" id="profile-email" type="email">
                  </div>
                </div>
                <div class="form-group">
                  <label class="form-label">Contacto</label>
                  <input class="form-input" id="profile-contact" type="tel">
                </div>
                <div class="flex-gap" style="justify-content:flex-end">
                  <button class="btn btn-primary" type="submit">Guardar alterações</button>
                </div>
              </div>
            </form>
          </div>

          <!-- Vehicles section -->
          <div class="card" style="padding:var(--space-xl)">
            <h2 style="font-size:1.1rem;font-family:var(--font-display);margin-bottom:var(--space-lg)">Meus Veículos</h2>
            <div class="vehicles-grid" id="vehicles-list" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:var(--space-md)"></div>
          </div>

          <!-- Recent reservations -->
          <div class="card" style="padding:var(--space-xl)">
            <div class="flex-between" style="margin-bottom:var(--space-lg)">
              <h2 style="font-size:1.1rem;font-family:var(--font-display)">Reservas Recentes</h2>
              <a href="reservations.html" style="font-size:0.85rem;color:var(--color-accent)">Ver todas →</a>
            </div>
            <div class="table-wrap">
              <table class="table">
                <thead>
                  <tr>
                    <th>Parque</th>
                    <th>Lugar</th>
                    <th>Data</th>
                    <th>Horário</th>
                    <th>Estado</th>
                    <th>Valor</th>
                  </tr>
                </thead>
                <tbody id="profile-reservations"></tbody>
              </table>
            </div>
          </div>
        </div>
      </div>

    </div>
  </main>

  <div id="footer-placeholder"></div>
  <div id="toast-container"></div>

  <script src="models/Model.js"></script>
  <script src="views/View.js"></script>
  <script src="controllers/Controller.js"></script>
  <script>
    // Set avatar initials after init
    document.addEventListener('DOMContentLoaded', () => {
      const user = Model.getCurrentUser();
      if (user) {
        const initials = user.name.split(' ').slice(0,2).map(n=>n[0]).join('');
        document.getElementById('avatar-initials').textContent = initials;
        document.getElementById('sidebar-name').textContent = user.name;
        document.getElementById('sidebar-email').textContent = user.email;
      }
    });
  </script>
</body>
</html>
